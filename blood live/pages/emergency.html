<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency - RedLink</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .pulse-red {
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% {
                box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(211, 47, 47, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(211, 47, 47, 0);
            }
        }

        .emergency-header {
            background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 100%);
            color: white;
            padding: 3rem 0;
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
        }

        .urgent-card {
            border-left: 5px solid var(--danger);
            background: #FFEBEE;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-heartbeat text-primary"></i>
                <span style="color: black;">Red</span><span class="text-primary">Link</span>
            </a>
            <div class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="find-blood.html">Find Blood</a></li>
                <li><a href="donor.html">Donate</a></li>
                <li><a href="emergency.html" class="active" style="color: var(--danger); font-weight: bold;">Emergency
                        Request</a></li>
                <li><a href="inventory.html">Blood Bank</a></li>
                <li><a href="awareness.html">Awareness</a></li>
            </ul>
        </div>
    </nav>

    <header class="emergency-header">
        <div class="container">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;"><i class="fas fa-ambulance"></i> Red Link Emergency
            </h1>
            <p style="font-size: 1.1rem; opacity: 0.9;">Broadcast urgent blood requirements to all nearby donors
                instantly.</p>
        </div>
    </header>

    <div class="container section-padding">

        <div class="grid-3" style="grid-template-columns: 1fr 1fr;">
            <!-- Request Form -->
            <div class="card pulse-red" style="grid-column: span 1;">
                <h2 class="text-danger mb-1"><i class="fas fa-bullhorn"></i> New Emergency Request</h2>
                <form id="emergency-form">
                    <div class="form-group">
                        <label class="form-label">Patient Name</label>
                        <input type="text" name="patientName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Blood Group Required</label>
                        <select name="bloodGroup" class="form-control" required
                            style="font-weight: bold; color: var(--danger);">
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Hospital Name</label>
                        <input type="text" name="hospital" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">City</label>
                        <select name="city" class="form-control" required>
                            <option value="Chennai">Chennai</option>
                            <option value="Coimbatore">Coimbatore</option>
                            <option value="Madurai">Madurai</option>
                            <option value="Salem">Salem</option>
                            <option value="Trichy">Trichy</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contact Person Phone</label>
                        <input type="tel" name="contact" class="form-control" pattern="[0-9]{10}" required>
                    </div>
                    <div class="form-group">
                        <input type="checkbox" id="urgent" name="urgent" checked>
                        <label for="urgent" class="text-danger" style="font-weight: bold;">Critical / Life
                            Threatening?</label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem;">BROADCAST
                        REQUEST</button>
                    <p class="text-center mt-1" style="font-size: 0.8rem; color: #777;">This will alert all matching
                        donors in the area.</p>
                </form>
            </div>

            <!-- Live Feed -->
            <div style="grid-column: span 1;">
                <h2 class="mb-1">Live Emergency Feed <span class="emergency-badge">LIVE</span></h2>
                <div id="emergency-feed"
                    style="display: flex; flex-direction: column; gap: 1rem; max-height: 600px; overflow-y: auto;">
                    <!-- JS populated -->
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="../js/data.js"></script>
    <script src="../js/main.js"></script>
    <script>
        function loadRequests() {
            const requests = DataManager.getRequests();
            const feed = document.getElementById('emergency-feed');
            feed.innerHTML = '';

            if (requests.length === 0) {
                feed.innerHTML = '<p class="text-center">No active emergencies at the moment.</p>';
                return;
            }

            requests.forEach(req => {
                const card = document.createElement('div');
                card.className = `card ${req.urgent ? 'urgent-card' : ''} animate`;

                const timeAgo = getTimeAgo(new Date(req.timestamp));

                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <span class="emergency-badge">${req.bloodGroup}</span>
                        <span style="font-size: 0.8rem; color: #555;">${timeAgo}</span>
                    </div>
                    <h3 class="mt-1">${req.hospital}</h3>
                    <p style="font-weight: 500;">Patient: ${req.patientName}</p>
                    <p style="color: #666;"><i class="fas fa-map-marker-alt"></i> ${req.city}</p>
                    <div class="mt-1" style="display: flex; justify-content: space-between; align-items: center;">
                        <a href="tel:${req.contact}" class="btn btn-primary" style="padding: 0.5rem 1rem;"><i class="fas fa-phone"></i> Call</a>
                        <button class="btn btn-outline" style="padding: 0.5rem 1rem;" onclick="shareReq(${req.id})"><i class="fas fa-share-alt"></i> Share</button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "Just now";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return `${Math.floor(hours / 24)}d ago`;
        }

        document.getElementById('emergency-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const req = Object.fromEntries(formData.entries());
            req.urgent = document.getElementById('urgent').checked; // Checkbox handling

            DataManager.addRequest(req);

            // Simulation of broadcasting
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Broadcasting...';
            btn.disabled = true;

            setTimeout(() => {
                showToast('🚨 Emergency Broadcast Sent to 50+ Donors!');
                btn.innerText = originalText;
                btn.disabled = false;
                e.target.reset();
                loadRequests();
            }, 1500);
        });

        function shareReq(id) {
            showToast('Link copied to clipboard!');
        }

        // Auto refresh feed every 30 seconds
        setInterval(loadRequests, 30000);
        loadRequests();
    </script>
</body>

</html>
